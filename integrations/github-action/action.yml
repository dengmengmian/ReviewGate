name: "ReviewGate"
description: "面向 AI Coding 时代的质量闸口：多 Agent 并行审查 + 分维度专家 + 置信度过滤"
branding:
  icon: "shield"
  color: "purple"

inputs:
  dimensions:
    description: "审查维度：all 或逗号分隔 security,perf,logic,style,ai_smell"
    required: false
    default: "all"
  fail-on:
    description: "何种判定导致 CI 失败：block | warn | never"
    required: false
    default: "block"
  comment:
    description: "是否在 PR 上发布摘要评论"
    required: false
    default: "true"
  timeout:
    description: "单维度墙钟超时（秒）；超时跳过该维度但保留已确认发现并告警，防止 CI 长时间挂起"
    required: false
    default: "300"
  config:
    description: "reviewgate.toml 配置文件路径"
    required: false
    default: "reviewgate.toml"
  version:
    description: "ReviewGate 版本（默认 latest）"
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Install ReviewGate
      shell: bash
      run: |
        curl -fsSL https://raw.githubusercontent.com/dengmengmian/ReviewGate/main/install.sh \
          | REVIEWGATE_VERSION="${{ inputs.version }}" sh

    - name: Run ReviewGate
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        REVIEWGATE_CONFIG: ${{ inputs.config }}
      run: |
        ARGS="--dimensions ${{ inputs.dimensions }} --fail-on ${{ inputs.fail-on }} --timeout ${{ inputs.timeout }}"
        if [ "${{ inputs.comment }}" = "true" ]; then ARGS="$ARGS --comment"; fi
        # PR 事件：CI 检出的是已提交的合并状态、工作区无未提交改动；
        # 必须按 base...head 范围审，否则默认的"工作区 diff"为空、审不到任何东西。
        BASE="${{ github.event.pull_request.base.sha }}"
        HEAD="${{ github.event.pull_request.head.sha }}"
        if [ -n "$BASE" ] && [ -n "$HEAD" ]; then
          ARGS="$ARGS --from $BASE --to $HEAD"
        fi
        reviewgate review $ARGS
