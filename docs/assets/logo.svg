<svg width="460" height="100" viewBox="0 0 460 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ReviewGate">
  <!-- 闸口图标：圆角方块代表"门/闸"，内开口里一个对勾 = 通过质量闸口 -->
  <rect x="12" y="14" width="72" height="72" rx="18" fill="#14B8A6"/>
  <rect x="30" y="28" width="36" height="44" rx="6" fill="#F0FDFA"/>
  <path d="M37 50 l8 9 l15 -20" stroke="#0F766E" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 文字标 -->
  <text x="102" y="64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#94A3B8">Review</tspan><tspan fill="#14B8A6">Gate</tspan>
  </text>
</svg>
