name: Release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # 单平台失败不取消其它平台（避免一次网络抖动毁掉整个发布）
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  name: linux-x64 }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, name: linux-arm64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,       name: darwin-x64 }
          - { os: macos-latest,   target: aarch64-apple-darwin,      name: darwin-arm64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    name: windows-x64 }
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross linker (linux-arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build
        env:
          CARGO_NET_RETRY: "10"      # 重试 crates.io 下载，扛住 CI 网络抖动
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo build --release --target ${{ matrix.target }} -p reviewgate-cli
      - name: Stage
        shell: bash
        run: |
          ext=""; [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          cp "target/${{ matrix.target }}/release/reviewgate$ext" "reviewgate-${{ matrix.name }}$ext"
      - uses: actions/upload-artifact@v4
        with:
          name: reviewgate-${{ matrix.name }}
          path: reviewgate-${{ matrix.name }}*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist
      - name: Checksums
        run: cd dist && shasum -a 256 reviewgate-* > sha256sum.txt
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
