name: Update Action major tag

# Action 的 tag 跟踪的是「action 接口 + 它随附的 installer」，而不是每次 CLI 发版。
# 引擎是运行时按 latest 下载的，所以 CLI 发版不需要动这个 tag。
# 只有当 action.yml 或 install.sh 改动并进入 main 时，才把移动式大版本 tag（v0 / 将来 v1）
# 移到当前提交，让 pin 了 @v0 的用户拿到修复。

on:
  push:
    branches: [main]
    paths:
      - 'integrations/github-action/**'
      - 'install.sh'

permissions:
  contents: write

jobs:
  move-major-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Move major tag to current commit
        run: |
          # 大版本号取自 Cargo.toml（[workspace.package] 的 version），0→1 自动跟随。
          MAJOR=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([0-9]+)\..*/\1/')
          TAG="v${MAJOR}"
          echo "Moving ${TAG} -> $(git rev-parse --short HEAD)"
          git tag -f "${TAG}"
          git push -f origin "${TAG}"
